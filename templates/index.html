<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortnite Sprite Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #07101f;
      color: #dce8ff;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(0,195,255,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(120,40,220,0.09) 0%, transparent 50%);
    }

    .page { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 24px 14px 60px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 22px; }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.3rem, 4vw, 2.1rem);
      color: #00c3ff;
      text-shadow: 0 0 22px rgba(0,195,255,0.55), 0 0 44px rgba(0,195,255,0.25);
      letter-spacing: 2px; margin-bottom: 5px;
    }
    header p { color: #607898; font-size: 0.95rem; letter-spacing: 1px; }

    /* ── Stats ── */
    .stats-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-pill {
      background: rgba(0,195,255,0.07); border: 1px solid rgba(0,195,255,0.18);
      border-radius: 999px; padding: 5px 18px; font-size: 0.88rem; color: #90b4cc;
    }
    .stat-pill b { color: #00c3ff; }

    /* ── Filters ── */
    .filters {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      margin-bottom: 16px;
    }
    .filter-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px; padding: 6px 15px;
      color: #7a92b0; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: all 0.18s; letter-spacing: 0.5px;
    }
    .filter-btn:hover { border-color: rgba(0,195,255,0.35); color: #b0d0e8; }
    .filter-btn.active { background: rgba(0,195,255,0.12); border-color: rgba(0,195,255,0.45); color: #00c3ff; }
    .filter-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.08); }
    .rarity-filter.active-Rare      { background: rgba(0,120,255,0.12); border-color: rgba(0,120,255,0.45); color: #4db8ff; }
    .rarity-filter.active-Epic      { background: rgba(160,0,240,0.12); border-color: rgba(160,0,240,0.45); color: #d070ff; }
    .rarity-filter.active-Legendary { background: rgba(255,140,0,0.12); border-color: rgba(255,140,0,0.45); color: #ffa040; }
    .rarity-filter.active-Mythic    { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.45); color: #ffd700; }

    /* ── Rarity group headers ── */
    .rarity-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; margin-top: 10px;
      font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
      letter-spacing: 2px; border-radius: 8px 8px 0 0;
    }
    .rarity-header.Rare      { background: rgba(0,120,255,0.10); color: #4db8ff; border-top: 1px solid rgba(0,120,255,0.25); }
    .rarity-header.Epic      { background: rgba(160,0,240,0.10); color: #d070ff; border-top: 1px solid rgba(160,0,240,0.25); }
    .rarity-header.Legendary { background: rgba(255,140,0,0.10); color: #ffa040; border-top: 1px solid rgba(255,140,0,0.25); }
    .rarity-header.Mythic    { background: rgba(255,215,0,0.10); color: #ffd700; border-top: 1px solid rgba(255,215,0,0.25); }
    .rarity-header span { opacity: 0.5; font-size: 0.7rem; }

    /* ── Sprite group block ── */
    .sprite-block {
      background: rgba(10,20,38,0.82); border: 1px solid rgba(255,255,255,0.07);
      border-top: none; overflow: hidden;
    }
    .sprite-block:last-of-type { border-radius: 0 0 8px 8px; margin-bottom: 6px; }

    .sprite-label-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 16px 8px; border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
    }
    .sprite-label-row .s-name { font-weight: 700; color: #c8dcf0; font-size: 1rem; }
    .sprite-label-row .s-ability { font-size: 0.8rem; color: #4a6888; margin-top: 2px; line-height: 1.4; }

    /* ── Variant rows ── */
    .variant-row {
      display: grid;
      grid-template-columns: 38px 110px 1fr 120px 180px 120px 200px;
      align-items: center;
      gap: 0;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
      min-height: 52px;
    }
    .variant-row:last-child { border-bottom: none; }
    .variant-row:hover { background: rgba(0,195,255,0.03); }
    .variant-row.owned { background: rgba(0,195,255,0.04); }
    .variant-row.owned:hover { background: rgba(0,195,255,0.07); }

    /* Own checkbox */
    .own-check {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.18); border-radius: 5px;
      background: rgba(255,255,255,0.04);
      cursor: pointer; transition: all 0.18s;
      position: relative; flex-shrink: 0;
    }
    .own-check:hover { border-color: #00c3ff; }
    .own-check:checked { background: #00c3ff; border-color: #00c3ff; }
    .own-check:checked::after {
      content: '✓'; position: absolute; top: -1px; left: 3px;
      color: #07101f; font-size: 13px; font-weight: 900;
    }

    /* Variant chip */
    .v-chip { display: inline-block; border-radius: 5px; padding: 3px 10px; font-size: 0.83rem; font-weight: 700; letter-spacing: 0.5px; }
    .v-Normal { background: rgba(180,200,230,0.10); border: 1px solid rgba(180,200,230,0.20); color: #b0c8e8; }
    .v-Gold   { background: rgba(255,215,0,0.12);   border: 1px solid rgba(255,215,0,0.30);   color: #ffd700; }
    .v-Gummy  { background: rgba(255,100,180,0.12); border: 1px solid rgba(255,100,180,0.28); color: #ff80c0; }
    .v-Galaxy { background: rgba(120,60,240,0.14);  border: 1px solid rgba(120,60,240,0.28);  color: #b090ff; }

    /* Cost */
    .v-cost { font-size: 0.88rem; font-weight: 600; color: #8090a8; white-space: nowrap; }
    .v-cost.highlight { color: #ffd700; }

    /* Level selector */
    .lvl-selector { display: flex; gap: 5px; }
    .lvl-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #506070;
      font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 700;
      cursor: pointer; transition: all 0.16s;
      display: flex; align-items: center; justify-content: center;
    }
    .lvl-btn:hover:not(:disabled) { border-color: rgba(0,195,255,0.5); color: #90c8e8; }
    .lvl-btn:disabled { cursor: default; opacity: 0.3; }
    .lvl-btn.lit { background: rgba(0,195,255,0.18); border-color: #00c3ff; color: #00c3ff; }
    .lvl-btn.lit.mastered { background: rgba(255,215,0,0.18); border-color: #ffd700; color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.35); }

    /* Summoned toggle */
    .s-toggle { display: flex; align-items: center; gap: 8px; }
    .s-toggle-label { font-size: 0.85rem; color: #506070; }
    .s-toggle-label.on { color: #00c85a; }
    .tgl { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
    .tgl input { opacity: 0; width: 0; height: 0; }
    .tgl-sl {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08); border-radius: 20px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.12);
      transition: 0.22s;
    }
    .tgl-sl::after {
      content: ''; position: absolute;
      width: 14px; height: 14px; left: 2px; top: 2px;
      background: #506070; border-radius: 50%; transition: 0.22s;
    }
    .tgl input:checked + .tgl-sl { background: rgba(0,195,80,0.28); border-color: #00c85a; }
    .tgl input:checked + .tgl-sl::after { transform: translateX(18px); background: #00c85a; }
    .tgl input:disabled + .tgl-sl { opacity: 0.3; cursor: default; }

    /* Status */
    .s-status { display: inline-flex; align-items: center; gap: 5px; border-radius: 5px; padding: 3px 9px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
    .status-mastered-locked { background: rgba(100,100,150,0.14); border: 1px solid rgba(100,100,200,0.22); color: #9898c8; }
    .status-crown           { background: rgba(255,215,0,0.10);   border: 1px solid rgba(255,215,0,0.28);   color: #ffd700; }
    .status-mastered        { background: rgba(255,180,0,0.10);   border: 1px solid rgba(255,180,0,0.22);   color: #ffb400; }
    .status-dead            { background: rgba(255,60,80,0.10);   border: 1px solid rgba(255,60,80,0.22);   color: #ff6070; }
    .status-active          { background: rgba(0,195,80,0.10);    border: 1px solid rgba(0,195,80,0.22);    color: #00c85a; }
    .s-unowned { font-size: 0.78rem; color: #2d4060; font-style: italic; }

    /* Loading / empty */
    .center-msg { text-align: center; padding: 60px 20px; color: #304050; font-size: 1rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 22px; right: 22px;
      padding: 10px 18px; border-radius: 7px; font-weight: 600; font-size: 0.92rem;
      z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.25s;
      pointer-events: none; max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: rgba(0,195,80,0.14);  border: 1px solid rgba(0,195,80,0.35);  color: #00c85a; }
    #toast.err { background: rgba(255,60,80,0.14); border: 1px solid rgba(255,60,80,0.35); color: #ff5060; }

    /* responsive — collapse grid on narrow screens */
    @media (max-width: 860px) {
      .variant-row { grid-template-columns: 32px 90px 90px 160px 100px 180px; gap: 6px; }
      .v-ability-col { display: none; }
    }
    @media (max-width: 620px) {
      .variant-row { grid-template-columns: 28px 80px 80px 150px 90px; }
      .summon-col { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1>🎮 FORTNITE SPRITE TRACKER</h1>
    <p>Select every sprite variant you own and set its level</p>
  </header>

  <div class="stats-bar">
    <div class="stat-pill">Owned: <b id="sTotal">0</b></div>
    <div class="stat-pill">Mastered: <b id="sMastered">0</b></div>
    <div class="stat-pill">Summoned: <b id="sSummoned">0</b></div>
    <div class="stat-pill">Not Summoned: <b id="sUnsummoned">0</b></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all"      onclick="setFilter('all',this)">All</button>
    <button class="filter-btn"        data-filter="owned"    onclick="setFilter('owned',this)">✅ Owned</button>
    <button class="filter-btn"        data-filter="unowned"  onclick="setFilter('unowned',this)">☐ Not Owned</button>
    <div class="filter-sep"></div>
    <button class="filter-btn rarity-filter" data-rarity="Rare"      onclick="setRarity('Rare',this)">Rare</button>
    <button class="filter-btn rarity-filter" data-rarity="Epic"      onclick="setRarity('Epic',this)">Epic</button>
    <button class="filter-btn rarity-filter" data-rarity="Legendary" onclick="setRarity('Legendary',this)">Legendary</button>
    <button class="filter-btn rarity-filter" data-rarity="Mythic"    onclick="setRarity('Mythic',this)">Mythic</button>
  </div>

  <div id="list"><div class="center-msg">Loading sprite directory…</div></div>

</div>
<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  let allRows   = [];
  let filterMode  = 'all';   // all | owned | unowned
  let rarityFilter = null;   // null | Rare | Epic | Legendary | Mythic

  const RARITY_ORDER = ['Rare','Epic','Legendary','Mythic'];
  const RARITY_ICONS = { Rare:'💧', Epic:'⚡', Legendary:'🔥', Mythic:'🌌' };

  // ── Boot ───────────────────────────────────────────────────────────────
  async function boot() {
    await loadCollection();
  }

  async function loadCollection() {
    try {
      const res  = await fetch('/api/collection');
      const data = await res.json();
      allRows = data.rows;
      updateStats(data.stats);
      render();
    } catch(e) {
      document.getElementById('list').innerHTML =
        `<div class="center-msg" style="color:#ff5060">Failed to load. Please refresh.</div>`;
    }
  }

  function updateStats(s) {
    document.getElementById('sTotal').textContent     = s.total;
    document.getElementById('sMastered').textContent  = s.mastered;
    document.getElementById('sSummoned').textContent  = s.summoned;
    document.getElementById('sUnsummoned').textContent = s.unsummoned;
  }

  // ── Filters ────────────────────────────────────────────────────────────
  function setFilter(mode, btn) {
    filterMode = mode;
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setRarity(r, btn) {
    if (rarityFilter === r) {
      rarityFilter = null;
      btn.classList.remove(`active-${r}`);
    } else {
      rarityFilter = r;
      document.querySelectorAll('.rarity-filter').forEach(b => {
        b.className = 'filter-btn rarity-filter';
      });
      btn.classList.add(`active-${r}`);
    }
    render();
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function render() {
    let rows = allRows;

    if (rarityFilter) rows = rows.filter(r => r.rarity === rarityFilter);
    if (filterMode === 'owned')   rows = rows.filter(r => r.owned);
    if (filterMode === 'unowned') rows = rows.filter(r => !r.owned);

    if (rows.length === 0) {
      document.getElementById('list').innerHTML =
        `<div class="center-msg">No sprites match the current filter.</div>`;
      return;
    }

    // Group by rarity then sprite name
    const grouped = {};
    for (const r of rows) {
      if (!grouped[r.rarity]) grouped[r.rarity] = {};
      if (!grouped[r.rarity][r.name]) grouped[r.rarity][r.name] = [];
      grouped[r.rarity][r.name].push(r);
    }

    let html = '';
    for (const rarity of RARITY_ORDER) {
      if (!grouped[rarity]) continue;
      const spriteGroups = grouped[rarity];
      const spriteNames  = Object.keys(spriteGroups);

      html += `<div class="rarity-header ${rarity}">${RARITY_ICONS[rarity]} ${rarity.toUpperCase()} <span>(${spriteNames.length} sprite${spriteNames.length>1?'s':''})</span></div>`;

      for (const spriteName of spriteNames) {
        const variants = spriteGroups[spriteName];
        const ability  = variants[0].ability;

        html += `<div class="sprite-block">
          <div class="sprite-label-row">
            <div>
              <div class="s-name">${esc(spriteName)}</div>
              <div class="s-ability">${esc(ability)}</div>
            </div>
          </div>`;

        for (const row of variants) {
          html += buildVariantRow(row);
        }
        html += `</div>`;
      }
    }

    document.getElementById('list').innerHTML = html;
  }

  function buildVariantRow(row) {
    const key     = row.key;
    const safe    = safeId(key);
    const owned   = row.owned;
    const lvl     = row.level;
    const summ    = row.summoned;

    // Level buttons
    let lvlBtns = '';
    for (let i = 1; i <= 5; i++) {
      const isLit    = owned && i <= lvl;
      const isMaster = isLit && lvl === 5;
      const label    = i === 5 ? '👑' : i;
      const cls      = isLit ? (isMaster ? 'lvl-btn lit mastered' : 'lvl-btn lit') : 'lvl-btn';
      lvlBtns += `<button class="${cls}" ${owned ? '' : 'disabled'}
        onclick="setLevel('${esc(key)}',${i})" title="Level ${i}${i===5?' (Mastered)':''}">${label}</button>`;
    }

    // Status
    let statusHtml = '';
    if (owned && row.status) {
      statusHtml = `<span class="s-status ${row.status.cls}">${row.status.icon} ${esc(row.status.text)}</span>`;
    } else {
      statusHtml = `<span class="s-unowned">— not collected —</span>`;
    }

    const sumLabel = summ ? 'Yes' : 'No';
    const sumLabelCls = summ ? 'on' : '';

    return `<div class="variant-row ${owned ? 'owned' : ''}" id="row-${safe}">
      <input type="checkbox" class="own-check" ${owned ? 'checked' : ''}
        onchange="toggleOwned('${esc(key)}', this.checked)" title="Mark as owned" />
      <span class="v-chip v-${esc(row.variant)}">${esc(row.variant)}</span>
      <span class="v-ability-col" style="font-size:0.75rem;color:#304858;padding: 0 8px"></span>
      <span class="v-cost ${row.cost >= 10000 ? 'highlight' : ''}">💨 ${row.cost.toLocaleString()} Dust</span>
      <div class="lvl-selector" id="lvls-${safe}">${lvlBtns}</div>
      <div class="s-toggle summon-col">
        <label class="tgl">
          <input type="checkbox" id="sum-${safe}" ${summ ? 'checked' : ''} ${owned ? '' : 'disabled'}
            onchange="toggleSummoned('${esc(key)}', this.checked)" />
          <span class="tgl-sl"></span>
        </label>
        <span class="s-toggle-label ${sumLabelCls}" id="sumlbl-${safe}">${sumLabel}</span>
      </div>
      <div id="stat-${safe}">${statusHtml}</div>
    </div>`;
  }

  // ── Actions ────────────────────────────────────────────────────────────
  async function toggleOwned(key, checked) {
    if (checked) {
      await upsert(key, 1, false);
    } else {
      await remove(key);
    }
  }

  async function setLevel(key, level) {
    const row = allRows.find(r => r.key === key);
    if (!row || !row.owned) return;
    await upsert(key, level, row.summoned);
  }

  async function toggleSummoned(key, summoned) {
    const row = allRows.find(r => r.key === key);
    if (!row || !row.owned) return;
    await upsert(key, row.level, summoned);
  }

  async function upsert(key, level, summoned) {
    try {
      const res = await fetch(`/api/collection/${encodeKey(key)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ level, summoned })
      });
      if (!res.ok) {
        const d = await res.json();
        showToast(d.error || 'Error saving.', 'err'); return;
      }
      // Update local state
      const row = allRows.find(r => r.key === key);
      if (row) {
        row.owned    = true;
        row.level    = level;
        row.summoned = summoned;
        row.mastered = level === 5;
        row.status   = computeStatus(level, summoned);
      }
      refreshRow(key);
      refreshStats();
    } catch(e) { showToast('Network error.', 'err'); }
  }

  async function remove(key) {
    try {
      await fetch(`/api/collection/${encodeKey(key)}`, { method: 'DELETE' });
      const row = allRows.find(r => r.key === key);
      if (row) {
        row.owned    = false;
        row.level    = 0;
        row.summoned = false;
        row.mastered = false;
        row.status   = null;
      }
      // If filter hides it, re-render; otherwise refresh row
      if (filterMode === 'owned') {
        render();
      } else {
        refreshRow(key);
      }
      refreshStats();
    } catch(e) { showToast('Network error.', 'err'); }
  }

  function refreshRow(key) {
    const safe = safeId(key);
    const row  = allRows.find(r => r.key === key);
    if (!row) return;
    const owned = row.owned;
    const lvl   = row.level;
    const summ  = row.summoned;

    // Checkbox
    const cb = document.querySelector(`#row-${safe} .own-check`);
    if (cb) cb.checked = owned;

    // Row class
    const rowEl = document.getElementById(`row-${safe}`);
    if (rowEl) rowEl.className = `variant-row ${owned ? 'owned' : ''}`;

    // Level buttons
    const lvlsCont = document.getElementById(`lvls-${safe}`);
    if (lvlsCont) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        const isLit    = owned && i <= lvl;
        const isMaster = isLit && lvl === 5;
        const label    = i === 5 ? '👑' : i;
        const cls      = isLit ? (isMaster ? 'lvl-btn lit mastered' : 'lvl-btn lit') : 'lvl-btn';
        html += `<button class="${cls}" ${owned ? '' : 'disabled'}
          onclick="setLevel('${esc(key)}',${i})" title="Level ${i}${i===5?' (Mastered)':''}">${label}</button>`;
      }
      lvlsCont.innerHTML = html;
    }

    // Summoned toggle
    const sumInput = document.getElementById(`sum-${safe}`);
    if (sumInput) { sumInput.checked = summ; sumInput.disabled = !owned; }
    const sumLbl = document.getElementById(`sumlbl-${safe}`);
    if (sumLbl) { sumLbl.textContent = summ ? 'Yes' : 'No'; sumLbl.className = `s-toggle-label ${summ ? 'on' : ''}`; }

    // Status
    const statEl = document.getElementById(`stat-${safe}`);
    if (statEl) {
      if (owned && row.status) {
        statEl.innerHTML = `<span class="s-status ${row.status.cls}">${row.status.icon} ${esc(row.status.text)}</span>`;
      } else {
        statEl.innerHTML = `<span class="s-unowned">— not collected —</span>`;
      }
    }
  }

  function refreshStats() {
    const owned    = allRows.filter(r => r.owned);
    const mastered = owned.filter(r => r.mastered).length;
    const summoned = owned.filter(r => r.summoned).length;
    document.getElementById('sTotal').textContent      = owned.length;
    document.getElementById('sMastered').textContent   = mastered;
    document.getElementById('sSummoned').textContent   = summoned;
    document.getElementById('sUnsummoned').textContent = owned.length - summoned;
  }

  function computeStatus(level, summoned) {
    const mastered = level === 5;
    if (mastered && !summoned) return { icon:'🔒', text:'Mastered & Not Summoned', cls:'status-mastered-locked' };
    if (mastered && summoned)  return { icon:'👑', text:'Mastered & Summoned',     cls:'status-crown' };
    if (mastered)              return { icon:'⭐', text:'Mastered',                cls:'status-mastered' };
    if (!summoned)             return { icon:'💀', text:'Not Summoned',            cls:'status-dead' };
    return { icon:'🏃', text:`Summoned (Lv ${level})`, cls:'status-active' };
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function showToast(msg, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 2800);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function safeId(key) { return key.replace(/[^a-zA-Z0-9]/g,'_'); }
  function encodeKey(key) {
    // encode each part separately so || is preserved as %7C%7C
    return key.split('||').map(encodeURIComponent).join('%7C%7C');
  }

  boot();
</script>
</body>
</html>
